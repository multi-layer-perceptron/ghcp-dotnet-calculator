# Workflow 14: Error handling
# Demonstrates continue-on-error for an experimental matrix row.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations#handling-failures
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idcontinue-on-error

name: 14-error-handling-workflow

run-name: 14-error-handling-workflow experimental matrix handling on ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-experimental-check:
    name: ${{ matrix.check_name }} check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The experimental row can fail without failing the entire workflow run.
    continue-on-error: ${{ matrix.check_name == 'experimental' }}
    strategy:
      matrix:
        check_name:
          - stable
          - experimental
    steps:
      - name: show-check-type
        run: |
          echo "This workflow introduces continue-on-error for experimental matrix rows."
          echo "Check name: ${{ matrix.check_name }}"
          echo "Experimental rows are tolerated with continue-on-error."

      - name: simulate-check-result
        run: |
          echo "${{ matrix.check_name }} row completed successfully."
