# Workflow 19: Reusable workflow definition
# Demonstrates workflow_call inputs for a workflow that can be called by another workflow.
# Docs: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#onworkflow_call

name: 19-workflow-call-workflow

on:
  workflow_call:
    # Reusable workflow inputs must declare a type.
    inputs:
      report_title:
        # The reusable workflow owns this limit so every caller gets consistent validation.
        description: Title to print from the reusable workflow
        required: true
        type: string
      source_language:
        # The workflow accepts locale-shaped values, then maps them to API language codes when needed.
        description: Source language or locale for the report title. Use nl-BE for Belgian Dutch/Flemish.
        required: true
        type: string
      target_language:
        description: Target language or locale for the report title. Use nl-BE for Belgian Dutch/Flemish.
        required: true
        type: string
      caller_workflow:
        # The caller passes this explicitly so the called workflow can report the originating workflow name.
        description: Name of the workflow that called this reusable workflow
        required: true
        type: string
    outputs:
      report_title:
        description: Title printed from the reusable workflow
        value: ${{ inputs.report_title }}
      translated_title:
        # Job outputs are promoted here so the caller can read needs.<job-id>.outputs.translated_title.
        description: Report title translated into the target language
        value: ${{ jobs.reusable-report.outputs.translated_title }}

permissions:
  # The called workflow only reads repository metadata and calls an external translation API.
  contents: read

jobs:
  reusable-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Step outputs become job outputs, and job outputs become workflow_call outputs above.
      translated_title: ${{ steps.translate-report-title.outputs.translated_title }}
    steps:
      - name: print-reusable-report
        run: |
          echo "This workflow introduces workflow_call so another workflow can reuse it."
          echo "Called from enterprise: ${{ github.event.enterprise.slug || 'not available' }}"
          echo "Called from organization: ${{ github.repository_owner }}"
          echo "Called from repository: ${{ github.repository }}"
          echo "Called from branch: ${{ github.ref_name }}"
          echo "Called from workflow: ${{ inputs.caller_workflow }}"
          echo "Report title: ${{ inputs.report_title }}"
          echo "Source language: ${{ inputs.source_language }}"
          echo "Target language: ${{ inputs.target_language }}"
      - name: translate-report-title
        id: translate-report-title
        shell: bash
        # Inputs are placed in environment variables to avoid quoting issues inside the Python heredoc.
        env:
          REPORT_TITLE: ${{ inputs.report_title }}
          SOURCE_LANGUAGE: ${{ inputs.source_language }}
          TARGET_LANGUAGE: ${{ inputs.target_language }}
        run: |
          python3 <<'PY'
          import html
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request
          import uuid

          language_map = {
              "en": "en",
              "fr": "fr",
              "de": "de",
              # MyMemory expects nl for Dutch, while the workflow exposes nl-BE for Belgian Dutch/Flemish.
              "nl-BE": "nl",
          }

          report_title = os.environ["REPORT_TITLE"]
          source_language = os.environ["SOURCE_LANGUAGE"]
          target_language = os.environ["TARGET_LANGUAGE"]
          max_title_length = 128
          title_length = len(report_title)

          print(f"Report title length: {title_length}/{max_title_length}")

          if title_length > max_title_length:
              print(f"::error::Report title must be {max_title_length} characters or fewer.", file=sys.stderr)
              sys.exit(1)

          if source_language not in language_map:
              print(f"::error::Unsupported source language '{source_language}'.", file=sys.stderr)
              sys.exit(1)

          if target_language not in language_map:
              print(f"::error::Unsupported target language '{target_language}'.", file=sys.stderr)
              sys.exit(1)

          if source_language == target_language:
              # Do not call the translation API when no translation is required.
              translated_title = report_title
          else:
              query = urllib.parse.urlencode(
                  {
                      "q": report_title,
                      "langpair": f"{language_map[source_language]}|{language_map[target_language]}",
                  }
              )
              url = f"https://api.mymemory.translated.net/get?{query}"

              with urllib.request.urlopen(url, timeout=10) as response:
                  payload = json.loads(response.read().decode("utf-8"))

              response_status = int(payload.get("responseStatus", 500))
              translated_title = payload.get("responseData", {}).get("translatedText", "")

              if response_status >= 400 or not translated_title:
                  response_details = payload.get("responseDetails", "No response details returned.")
                  print(f"::error::Translation API request failed: {response_details}", file=sys.stderr)
                  sys.exit(1)

              translated_title = html.unescape(translated_title)

          delimiter = f"translated_title_{uuid.uuid4().hex}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              # Use a unique delimiter so translated titles with special characters are preserved safely.
              github_output.write(f"translated_title<<{delimiter}\n{translated_title}\n{delimiter}\n")

          print(f"Translated title: {translated_title}")
          PY
