# Workflow 17: Run defaults
# Demonstrates defaults.run.shell so all run steps use PowerShell unless overridden.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/set-default-values-for-jobs
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrun

name: 17-run-defaults-workflow

run-name: 17-run-defaults-workflow defaults on ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  # These defaults apply to every run step in the workflow unless a job or step overrides them.
  run:
    shell: pwsh

jobs:
  use-run-defaults:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: show-default-shell
        run: |
          Write-Output "This workflow introduces defaults.run.shell."
          Write-Output "Every run step in this workflow uses PowerShell unless it overrides the shell."

      - name: list-workflow-count
        run: |
          $workflowCount = (Get-ChildItem -Path .github/workflows -Filter '??-*-workflow.yml').Count
          Write-Output "Staged workflow count: $workflowCount"
