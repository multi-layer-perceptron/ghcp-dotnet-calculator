# Workflow 05: Repository values
# Demonstrates repository-level variables and secrets alongside environment-level values.
# Docs: https://docs.github.com/en/actions/concepts/workflows-and-actions/variables
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-secrets

name: 05-repo-values-workflow
on:
  push:
  workflow_dispatch:

env:
  # Workflow-level env values are available to all jobs unless a job or step overrides them.
  # Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#env
  REPO_NAME: ${{ github.repository }}
  DEFAULT_BRANCH_REF: ${{ github.ref }}
  REPO_VARIABLE: ${{ vars[format('{0}', 'REPO_LEVEL_VARIABLE')] || 'repo-demo-variable-default' }}
  REPO_SECRET: ${{ secrets[format('{0}', 'REPO_LEVEL_SECRET')] }}

jobs:
  list-contents:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: |
          echo "🎉 The job was triggered by event: ${{ github.event_name }}"
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ."

      - uses: actions/checkout@v4

      - name: list-contents-with-echo
        run: |
          echo "The repository ${{ github.repository }} contains the following files:"
          tree

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: list-contents-with-powershell-script
        shell: pwsh
        run: ./scripts/Get-DirectoryContents.ps1

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: list-contents-with-powershell-inline
        shell: pwsh
        run: Get-ChildItem -Path . -Recurse

      # List the directory contents of the repository using a python script at scripts/getDirectoryContents.py
      - name: list-contents-with-python
        run: python3 scripts/getDirectoryContents.py

  retrieve-values:
    runs-on: ubuntu-latest
    needs: list-contents
    environment: qua
    env:
      TARGET_ENVIRONMENT: qua
      QUA_VARIABLE: ${{ vars[format('{0}', 'QUA_VARIABLE')] || 'qua-demo-variable-default' }}
      QUA_SECRET: ${{ secrets[format('{0}', 'QUA_SECRET')] }}
    steps:
      - name: prepare-demo-secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REPO_SECRET)) {
            $repoSecretValue = "demo-repo-secret-$([Guid]::NewGuid())"
            Add-Content -Path $env:GITHUB_ENV -Value "REPO_SECRET_SOURCE=generated-demo-default"
          }
          else {
            $repoSecretValue = $env:REPO_SECRET
            Add-Content -Path $env:GITHUB_ENV -Value "REPO_SECRET_SOURCE=repository-secret"
          }

          if ([string]::IsNullOrWhiteSpace($env:QUA_SECRET)) {
            $quaSecretValue = "demo-qua-secret-$([Guid]::NewGuid())"
            Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_SOURCE=generated-demo-default"
          }
          else {
            $quaSecretValue = $env:QUA_SECRET
            Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_SOURCE=environment-secret"
          }

          "::add-mask::$repoSecretValue"
          "::add-mask::$quaSecretValue"
          Add-Content -Path $env:GITHUB_ENV -Value "REPO_SECRET_VALUE=$repoSecretValue"
          Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_VALUE=$quaSecretValue"

      - name: retrieve-secrets
        run: |
          echo "REPO_LEVEL_SECRET source is $REPO_SECRET_SOURCE. The value is masked and not printed."
          echo "QUA_SECRET source is $QUA_SECRET_SOURCE. The value is masked and not printed."

      - name: retrieve-variables
        run: |
          echo "The target environment is ${{ env.TARGET_ENVIRONMENT }}."
          echo "The value of QUA_VARIABLE is ${{ env.QUA_VARIABLE }}."

      - name: retrieve-repo-values
        run: |
          echo "Repository name from workflow-level env is ${{ env.REPO_NAME }}"
          echo "Current ref from workflow-level env is ${{ env.DEFAULT_BRANCH_REF }}"
          echo "The value of REPO_LEVEL_VARIABLE is ${{ env.REPO_VARIABLE }}"
