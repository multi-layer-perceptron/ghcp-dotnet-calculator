# Workflow 24: Deploy Azure resources with Terraform
# Demonstrates GitHub OIDC authentication, Terraform validation, and Azure resource deployment.

name: 24-deploy-resources-workflow

run-name: 24-deploy-resources-workflow ${{ inputs.terraform_action || 'plan' }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run. Use plan first, then apply after reviewing the plan.
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
      azure_client_id:
        description: Application client ID whose federated credential trusts this repository and branch.
        required: true
        type: string
      azure_tenant_id:
        description: Microsoft Entra tenant ID for the learner's Azure subscription.
        required: true
        type: string
      azure_subscription_id:
        description: Azure subscription ID that contains the existing lab resource group.
        required: true
        type: string
      resource_group_name:
        description: Existing Azure resource group for the lab resources and Terraform state account.
        required: true
        type: string
        default: rg-calculator-lab
      azure_location:
        description: Azure region for resources created by this workflow.
        required: true
        type: string
        default: eastus2
      application_name:
        description: Display name used for the calculator deployment identity.
        required: true
        type: string
        default: calculator-lab-app
      key_vault_name:
        description: Globally unique Key Vault name for this lab run.
        required: true
        type: string
      postgresql_server_name:
        description: Globally unique PostgreSQL Flexible Server name for this lab run.
        required: true
        type: string
      terraform_state_resource_group:
        description: Resource group containing the pre-provisioned Terraform state storage account.
        required: true
        type: string
      terraform_state_storage_account:
        description: Pre-provisioned state storage account accessible through OIDC.
        required: true
        type: string
      terraform_state_container:
        description: Existing blob container used for Terraform state.
        required: true
        type: string
        default: tfstate

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ inputs.azure_client_id }}
  ARM_TENANT_ID: ${{ inputs.azure_tenant_id }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
  ARM_USE_OIDC: true
  TF_IN_AUTOMATION: true
  TF_VAR_subscription_id: ${{ inputs.azure_subscription_id }}
  TF_VAR_tenant_id: ${{ inputs.azure_tenant_id }}
  TF_VAR_resource_group_name: ${{ inputs.resource_group_name }}
  TF_VAR_location: ${{ inputs.azure_location }}
  TF_VAR_application_name: ${{ inputs.application_name }}
  TF_VAR_key_vault_name: ${{ inputs.key_vault_name }}
  TF_VAR_postgresql_server_name: ${{ inputs.postgresql_server_name }}
  TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
  TF_VAR_postgresql_admin_username: postgres_user
  TF_BACKEND_RESOURCE_GROUP_NAME: ${{ inputs.terraform_state_resource_group }}
  TF_BACKEND_STORAGE_ACCOUNT_NAME: ${{ inputs.terraform_state_storage_account }}
  TF_BACKEND_CONTAINER_NAME: ${{ inputs.terraform_state_container }}

jobs:
  terraform-plan:
    name: Terraform plan
    if: ${{ inputs.terraform_action == 'plan' || inputs.terraform_action == 'apply' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: plan
    defaults:
      run:
        working-directory: infra/terraform/24-postgresql-flexible-server
    steps:
      - name: validate-oidc-configuration
        working-directory: .
        run: |
          if [ -z "$ARM_CLIENT_ID" ]; then
            echo "::error::Provide an application client ID in the azure_client_id workflow input after configuring federation."
            exit 1
          fi
          if [ -z "$ARM_TENANT_ID" ] || [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            echo "::error::Provide azure_tenant_id and azure_subscription_id workflow inputs."
            exit 1
          fi
          if [ -z "$TF_VAR_postgresql_admin_password" ]; then
            echo "::error::Set repository secret POSTGRES_ADMIN_PASSWORD before running this workflow."
            exit 1
          fi
          echo "Using subscription $ARM_SUBSCRIPTION_ID and tenant $ARM_TENANT_ID."

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: azure-login
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: setup-terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: terraform-init
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP_NAME" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT_NAME" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER_NAME" \
            -backend-config="key=24-postgresql-flexible-server.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="client_id=$ARM_CLIENT_ID" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID"

      - name: terraform-format-check
        run: terraform fmt -check -diff -recursive

      - name: terraform-validate
        run: terraform validate

      - name: terraform-plan
        run: terraform plan -out="24-deploy-resources.tfplan"

  terraform-apply:
    name: Terraform apply
    if: ${{ inputs.terraform_action == 'apply' }}
    needs: terraform-plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: apply
    defaults:
      run:
        working-directory: infra/terraform/24-postgresql-flexible-server
    steps:
      - name: validate-oidc-configuration
        working-directory: .
        run: |
          if [ -z "$ARM_CLIENT_ID" ]; then
            echo "::error::Provide an application client ID in the azure_client_id workflow input after configuring federation."
            exit 1
          fi
          if [ -z "$ARM_TENANT_ID" ] || [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            echo "::error::Provide azure_tenant_id and azure_subscription_id workflow inputs."
            exit 1
          fi
          if [ -z "$TF_VAR_postgresql_admin_password" ]; then
            echo "::error::Set repository secret POSTGRES_ADMIN_PASSWORD before running this workflow."
            exit 1
          fi
          echo "Using subscription $ARM_SUBSCRIPTION_ID and tenant $ARM_TENANT_ID."

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: azure-login
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: setup-terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: terraform-init
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RESOURCE_GROUP_NAME" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT_NAME" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER_NAME" \
            -backend-config="key=24-postgresql-flexible-server.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="client_id=$ARM_CLIENT_ID" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID"

      - name: apply-terraform-iac
        run: terraform apply -auto-approve

      - name: store-postgresql-credentials-in-key-vault
        env:
          KEY_VAULT_NAME: ${{ inputs.key_vault_name }}
          POSTGRESQL_ADMIN_USERNAME_SECRET_NAME: postgresql-admin-username
          POSTGRESQL_ADMIN_PASSWORD_SECRET_NAME: postgresql-admin-password
        run: |
          secret_expiry_utc=$(date -u -d '+30 days' '+%Y-%m-%dT%H:%M:%SZ')

          for attempt in 1 2 3 4 5; do
            if az keyvault secret set \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$POSTGRESQL_ADMIN_USERNAME_SECRET_NAME" \
              --value "$TF_VAR_postgresql_admin_username" \
              --expires "$secret_expiry_utc" \
              --content-type "text/plain" \
              --only-show-errors 1>/dev/null && \
              az keyvault secret set \
                --vault-name "$KEY_VAULT_NAME" \
                --name "$POSTGRESQL_ADMIN_PASSWORD_SECRET_NAME" \
                --value "$TF_VAR_postgresql_admin_password" \
                --expires "$secret_expiry_utc" \
                --content-type "text/plain" \
                --only-show-errors 1>/dev/null; then
              echo "PostgreSQL credentials were stored in Key Vault $KEY_VAULT_NAME."
              exit 0
            fi

            echo "Waiting for Key Vault RBAC propagation before retry $attempt."
            sleep 15
          done

          echo "::error::Unable to store PostgreSQL credentials in Key Vault after RBAC propagation retries."
          exit 1
