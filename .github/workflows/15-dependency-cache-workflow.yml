name: 15-dependency-cache-workflow

run-name: 15-dependency-cache-workflow restores a NuGet cache on ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore-with-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: restore-nuget-cache
        id: restore-nuget-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/workspace/calculator-xunit-testing/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: show-cache-restore-metadata
        run: |
          echo "cache-hit=${{ steps.restore-nuget-cache.outputs.cache-hit }}"
          echo "cache-primary-key=${{ steps.restore-nuget-cache.outputs.cache-primary-key }}"
          echo "cache-matched-key=${{ steps.restore-nuget-cache.outputs.cache-matched-key }}"

      - name: show-cache-compression-info
        run: |
          tar --version
          zstd --version || true
          du -sh ~/.nuget/packages || true

      - name: restore-calculator-solution
        run: dotnet restore src/workspace/calculator-xunit-testing/calculator.slnx

      - name: save-nuget-cache
        id: save-nuget-cache
        if: steps.restore-nuget-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.nuget/packages
          key: ${{ steps.restore-nuget-cache.outputs.cache-primary-key }}

      - name: show-cache-upload-metadata
        if: always()
        run: |
          echo "cache-upload-status=${{ steps.save-nuget-cache.outcome }}"
          echo "cache-upload-conclusion=${{ steps.save-nuget-cache.conclusion }}"
