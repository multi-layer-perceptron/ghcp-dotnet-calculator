# Workflow 08: Timeouts
# Demonstrates job-level timeout-minutes to prevent hung jobs from running indefinitely.
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idtimeout-minutes

name: 08-timeouts-workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bounded-run:
    runs-on: ubuntu-latest
    # GitHub cancels the job if it exceeds this limit.
    timeout-minutes: 5
    steps:
      - name: explain-timeout
        run: |
          echo "This job introduces timeout-minutes so a stuck run cannot continue forever."
          echo "The timeout for this job is 5 minutes." 
          for minute in {1..7}; do
            echo "Delay minute ${minute} of 7..."
            sleep 60
          done

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: list-source-root
        run: |
          echo "Top-level source workspace contents:"
          find src -maxdepth 2 -type d -print | sort
