# Workflow 19: Reusable workflow definition
# Demonstrates workflow_call inputs for a workflow that can be called by another workflow.
# Docs: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#onworkflow_call

name: 19-workflow-call-workflow

on:
  workflow_call:
    # Reusable workflow inputs must declare a type.
    inputs:
      report_title:
        # The reusable workflow owns this limit so every caller gets consistent validation.
        description: Title to print from the reusable workflow
        required: true
        type: string
      source_language:
        # The workflow accepts locale-shaped values and validates them before translation.
        description: Source language or locale for the report title. Use nl-BE for Belgian Dutch/Flemish.
        required: true
        type: string
      target_language:
        description: Target language or locale for the report title. Use nl-BE for Belgian Dutch/Flemish.
        required: true
        type: string
      caller_workflow:
        # The caller passes this explicitly so the called workflow can report the originating workflow name.
        description: Name of the workflow that called this reusable workflow
        required: true
        type: string
    outputs:
      report_title:
        description: Title printed from the reusable workflow
        value: ${{ inputs.report_title }}
      translated_title:
        # Job outputs are promoted here so the caller can read needs.<job-id>.outputs.translated_title.
        description: Report title translated into the target language
        value: ${{ jobs.reusable-report.outputs.translated_title }}

permissions:
  # The called workflow only reads repository metadata and prints output.
  contents: read

jobs:
  reusable-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Step outputs become job outputs, and job outputs become workflow_call outputs above.
      translated_title: ${{ steps.translate-report-title.outputs.translated_title }}
    steps:
      - name: print-reusable-report
        run: |
          echo "This workflow introduces workflow_call so another workflow can reuse it."
          echo "Called from enterprise: ${{ github.event.enterprise.slug || 'not available' }}"
          echo "Called from organization: ${{ github.repository_owner }}"
          echo "Called from repository: ${{ github.repository }}"
          echo "Called from branch: ${{ github.ref_name }}"
          echo "Called from workflow: ${{ inputs.caller_workflow }}"
          echo "Report title: ${{ inputs.report_title }}"
          echo "Source language: ${{ inputs.source_language }}"
          echo "Target language: ${{ inputs.target_language }}"
      - name: translate-report-title
        id: translate-report-title
        shell: bash
        # Inputs are placed in environment variables to avoid quoting issues inside the shell script.
        env:
          REPORT_TITLE: ${{ inputs.report_title }}
          SOURCE_LANGUAGE: ${{ inputs.source_language }}
          TARGET_LANGUAGE: ${{ inputs.target_language }}
        run: |
          report_title="$REPORT_TITLE"
          source_language="$SOURCE_LANGUAGE"
          target_language="$TARGET_LANGUAGE"
          max_title_length=128
          title_length=${#report_title}

          echo "Report title length: ${title_length}/${max_title_length}"

          if [ "$title_length" -gt "$max_title_length" ]; then
            echo "::error::Report title must be ${max_title_length} characters or fewer."
            exit 1
          fi

          case "$source_language" in
            en|fr|de|nl-BE)
              ;;
            *)
              echo "::error::Unsupported source language '$source_language'."
              exit 1
              ;;
          esac

          case "$target_language" in
            en|fr|de|nl-BE)
              ;;
            *)
              echo "::error::Unsupported target language '$target_language'."
              exit 1
              ;;
          esac

          if [ "$source_language" = "$target_language" ]; then
            # Do not translate when source and target are already the same.
            translated_title="$report_title"
          else
            case "$report_title|$target_language" in
              "The quick brown fox jumps over the lazy dog|en")
                translated_title="The quick brown fox jumps over the lazy dog"
                ;;
              "The quick brown fox jumps over the lazy dog|fr")
                translated_title="Le vif renard brun saute par-dessus le chien paresseux"
                ;;
              "The quick brown fox jumps over the lazy dog|de")
                translated_title="Der schnelle braune Fuchs springt über den faulen Hund"
                ;;
              "The quick brown fox jumps over the lazy dog|nl-BE")
                translated_title="De snelle bruine vos springt over de luie hond"
                ;;
              "Advances in Neural Information Processing Systems: Attention is All You Need, 2027|en")
                translated_title="Advances in Neural Information Processing Systems: Attention is All You Need, 2027"
                ;;
              "Advances in Neural Information Processing Systems: Attention is All You Need, 2027|fr")
                translated_title="Avancées dans les systèmes de traitement de l'information neuronale : L'attention est tout ce dont vous avez besoin, 2027"
                ;;
              "Advances in Neural Information Processing Systems: Attention is All You Need, 2027|de")
                translated_title="Fortschritte in neuronalen Informationsverarbeitungssystemen: Aufmerksamkeit ist alles, was Sie brauchen, 2027"
                ;;
              "Advances in Neural Information Processing Systems: Attention is All You Need, 2027|nl-BE")
                translated_title="Vooruitgang in neurale informatieverwerkingssystemen: Aandacht is alles wat u nodig hebt, 2027"
                ;;
              "The Future is Faster Than You Think - Peter Diamandis (2020)|en")
                translated_title="The Future is Faster Than You Think - Peter Diamandis (2020)"
                ;;
              "The Future is Faster Than You Think - Peter Diamandis (2020)|fr")
                translated_title="L'avenir est plus rapide que vous ne le pensez - Peter Diamandis (2020)"
                ;;
              "The Future is Faster Than You Think - Peter Diamandis (2020)|de")
                translated_title="Die Zukunft ist schneller, als Sie denken - Peter Diamandis (2020)"
                ;;
              "The Future is Faster Than You Think - Peter Diamandis (2020)|nl-BE")
                translated_title="De toekomst is sneller dan u denkt - Peter Diamandis (2020)"
                ;;
              *)
                echo "::error::No deterministic translation is configured for report title '$report_title' and target language '$target_language'."
                exit 1
                ;;
            esac
          fi

          delimiter="translated_title_${RANDOM}_${RANDOM}"
          {
            echo "translated_title<<$delimiter"
            echo "$translated_title"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

          echo "Translated title: $translated_title"
