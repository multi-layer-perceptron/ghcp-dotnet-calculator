# yaml-language-server: $schema=https://json.schemastore.org/azure-pipelines.json

name: 00-ghcp-workflow-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

jobs:
  - job: list_contents
    displayName: List Repository Contents
    pool:
      vmImage: ubuntu-latest

    steps:
      - pwsh: |
          Write-Host "========== Pipeline Trigger Information ==========" -ForegroundColor Cyan
          Write-Host "Reason:        $(Build.Reason)" -ForegroundColor Yellow
          Write-Host "Branch:        $(Build.SourceBranchName)" -ForegroundColor Yellow
          Write-Host "Repository:    $(Build.Repository.Name)" -ForegroundColor Yellow
          Write-Host "Requested For: $(Build.RequestedFor)" -ForegroundColor Yellow
          Write-Host "================================================" -ForegroundColor Cyan
        displayName: Display Pipeline Trigger Information

      - checkout: self
        displayName: Checkout Repository

      - pwsh: |
          Write-Host "========== Repository Contents (Tree - Depth 3) ==========" -ForegroundColor Cyan
          if (Get-Command tree -ErrorAction SilentlyContinue) {
            tree -L 3 -h --du
          }
          else {
            Write-Host "Tree command not available, using alternative listing" -ForegroundColor Yellow
          }
          Write-Host "========================================================" -ForegroundColor Cyan
        displayName: List Repository Contents with Tree Command

      - pwsh: |
          function Get-DirectoryTree {
            param(
              [string]$Path = '.',
              [int]$Depth = 0,
              [int]$MaxDepth = 3
            )

            if ($Depth -gt $MaxDepth) { return }

            try {
              $items = Get-ChildItem -Path $Path -Force -ErrorAction SilentlyContinue | Sort-Object -Property @{Expression = {$_.PSIsContainer}; Descending = $true}, Name

              foreach ($item in $items) {
                $indent = "  " * $Depth
                $type = if ($item.PSIsContainer) { "[DIR]" } else { "[FILE]" }
                $size = if (-not $item.PSIsContainer) { " ({0:N0} KB)" -f ($item.Length / 1KB) } else { "" }

                if ($item.PSIsContainer) {
                  Write-Host "$indent$type $($item.Name)" -ForegroundColor Yellow
                }
                else {
                  Write-Host "$indent$type $($item.Name)$size" -ForegroundColor Green
                }

                if ($item.PSIsContainer -and $Depth -lt $MaxDepth) {
                  Get-DirectoryTree -Path $item.FullName -Depth ($Depth + 1) -MaxDepth $MaxDepth
                }
              }
            }
            catch {
              Write-Host "Error accessing path: $_" -ForegroundColor Red
            }
          }

          Write-Host "========== Repository Structure (PowerShell) ==========" -ForegroundColor Cyan
          Get-DirectoryTree -Path '.' -MaxDepth 3
          Write-Host "======================================================" -ForegroundColor Cyan
        displayName: List Directory Contents with PowerShell

  - job: retrieve_values
    displayName: Display Pipeline Metadata
    dependsOn: list_contents
    pool:
      vmImage: ubuntu-latest

    steps:
      - pwsh: |
          Write-Host "========== Branch and Pipeline Metadata ==========" -ForegroundColor Cyan
          Write-Host "Branch Name (SourceBranchName):      $(Build.SourceBranchName)" -ForegroundColor Yellow
          Write-Host "Full Reference (SourceBranch):       $(Build.SourceBranch)" -ForegroundColor Yellow
          Write-Host "Pull Request Source Branch:          $(System.PullRequest.SourceBranch)" -ForegroundColor Yellow
          Write-Host "Pull Request Target Branch:          $(System.PullRequest.TargetBranch)" -ForegroundColor Yellow
          Write-Host "Build ID:                            $(Build.BuildId)" -ForegroundColor Yellow
          Write-Host "Build Number:                        $(Build.BuildNumber)" -ForegroundColor Yellow
          Write-Host "Job ID:                              $(System.JobId)" -ForegroundColor Yellow
          Write-Host "Job Attempt:                         $(System.JobAttempt)" -ForegroundColor Yellow
          Write-Host "================================================" -ForegroundColor Cyan
        displayName: Display Branch Information