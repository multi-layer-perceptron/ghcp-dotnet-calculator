# Workflow 13: Matrix strategy
# Demonstrates running the same job across multiple runner operating systems.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstrategymatrix

name: 13-matrix-workflow

run-name: 13-matrix-workflow matrix run on ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-directory-check:
    name: Directory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      # Each value in matrix.os creates a separate job run.
      # task-item: add mac os-latest to the matrix.os list to run on macOS as well.
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: show-runner-and-workflows
        shell: pwsh
        run: |
          Write-Output "This workflow introduces a basic matrix strategy."
          Write-Output "Matrix OS: ${{ matrix.os }}"
          Get-ChildItem -Path .github/workflows -Filter '??-*-workflow.yml' | Select-Object -ExpandProperty Name
