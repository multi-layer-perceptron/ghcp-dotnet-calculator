# Workflow 22: Cross-repository reusable workflow caller
# Inspection and copy template: run this workflow from another repository in the same organization.
# Demonstrates calling Workflow 19 from another repository in the same organization.
# Docs: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows#calling-a-reusable-workflow
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_iduses

name: 22-reusable-call-workflow

run-name: 22-reusable-call-workflow calls reusable workflow on ${{ github.ref_name }}

on:
  workflow_dispatch:
    # Manual runs can override the translation inputs without changing the workflow file.
    inputs:
      report_title:
        # The reusable workflow enforces the 128-character limit so every caller gets the same validation.
        description: Report title to translate. Maximum 128 characters.
        required: true
        type: string
        default: "The Future is Faster Than You Think - Peter Diamandis (2020)"
      source_language:
        # Two-letter language inputs use ISO 639-1 codes; nl-BE adds the ISO 3166-1 alpha-2 Belgium region code.
        description: Source language or locale for the report title. Use ISO 639-1 codes en, fr, de, or nl-BE for Belgian Dutch/Flemish.
        required: true
        type: choice
        default: "en"
        options:
          - "en"
          - "fr"
          - "de"
          - "nl-BE"
      target_language:
        # Keep source and target options aligned so the same ISO 639-1 and locale rules apply to both inputs.
        description: Target language or locale for the report title. Use ISO 639-1 codes en, fr, de, or nl-BE for Belgian Dutch/Flemish.
        required: true
        type: choice
        default: "de"
        options:
          - "en"
          - "fr"
          - "de"
          - "nl-BE"

permissions:
  # The workflow only needs repository read access because it calls a reusable workflow and prints output.
  contents: read

jobs:
  warn-when-languages-match:
    # This warning is informational; the reusable workflow still handles same-language requests safely.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ (inputs.source_language || 'en') == (inputs.target_language || 'de') }}
    steps:
      - name: show-matching-language-warning
        run: echo "::warning::Source and target languages are both '${{ inputs.source_language || 'en' }}'. The title will be returned unchanged."

  call-title-translator:
    # Cross-repository reusable workflows use owner/repository/path@ref syntax.
    # Copy this template to a different repository in the same organization before running it.
    uses: multi-layer-perceptron/ghcp-dotnet-calculator/.github/workflows/19-called-workflow.yml@main
    with:
      # The called workflow owns title validation, keeping the limit in one place for every caller.
      report_title: ${{ inputs.report_title || 'The Future is Faster Than You Think - Peter Diamandis (2020)' }}
      source_language: ${{ inputs.source_language || 'en' }}
      target_language: ${{ inputs.target_language || 'de' }}
      # Pass the caller workflow name explicitly because the called workflow runs in its own workflow context.
      caller_workflow: ${{ github.workflow }}

  display-translated-title:
    # Downstream jobs consume reusable workflow outputs through the needs context.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: call-title-translator
    steps:
      - name: show-translated-title
        env:
          REPORT_TITLE: ${{ inputs.report_title || 'The Future is Faster Than You Think - Peter Diamandis (2020)' }}
          TRANSLATED_TITLE: ${{ needs.call-title-translator.outputs.translated_title }}
        run: |
          printf 'Source title: %s\n' "$REPORT_TITLE"
          printf 'Translated title: %s\n' "$TRANSLATED_TITLE"
