# Workflow 16: Concurrency
# Demonstrates canceling older in-progress runs for the same workflow and ref.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/control-workflow-concurrency
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#concurrency

name: 16-concurrency-workflow

run-name: 16-concurrency-workflow concurrency group for ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Include github.workflow so this group does not cancel runs from unrelated workflows.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  show-concurrency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: explain-concurrency
        run: |
          echo "This workflow introduces a concurrency group."
          echo "New runs for the same workflow and ref cancel in-progress runs."
          echo "Group: ${{ github.workflow }}-${{ github.ref }}" 
          echo "Waiting 3 minutes to demonstrate concurrency cancellation."
          sleep 180
