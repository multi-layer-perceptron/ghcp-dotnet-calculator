# Workflow 10: Run names
# Demonstrates a dynamic run-name so runs are easier to identify in the Actions UI.
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#run-name

name: 10-show-commit-workflow

# Expressions can reference github and inputs contexts in run-name.
run-name: 10-show-commit-workflow started by ${{ github.actor }} on ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  show-run-name:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: explain-run-name
        run: |
          echo "This workflow introduces run-name for clearer entries in the Actions UI."
          echo "Actor: ${{ github.actor }}"
          echo "Ref name: ${{ github.ref_name }}"

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: show-latest-commit
        run: git log -1 --oneline
