# Workflow 20: Reusable workflow caller
# Demonstrates calling a local reusable workflow as a job with the uses keyword.
# Docs: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows#calling-a-reusable-workflow
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_iduses

name: 20-reusable-call-workflow

run-name: 20-reusable-call-workflow calls reusable workflow on ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-reusable-workflow:
    # Local reusable workflows are called from jobs, not from steps.
    uses: ./.github/workflows/19-workflow-call-workflow.yml
    with:
      report_title: Called from 20-reusable-call-workflow
