# Workflow 07: Permissions
# Demonstrates least-privilege GITHUB_TOKEN permissions at workflow scope.
# Docs: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions

name: 07-permissions-workflow

on:
  workflow_dispatch:

permissions:
  # Setting one permission makes unspecified scopes default to none.
  contents: read

jobs:
  inspect-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: show-workflow-context
        run: |
          echo "The workflow was triggered by ${{ github.event_name }}."
          echo "The GITHUB_TOKEN is limited to read-only repository contents."

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: list-workflow-files
        run: |
          echo "Workflow files available to this read-only job:"
          find .github/workflows -maxdepth 1 -type f -name '??-*-workflow.yml' -print | sort
