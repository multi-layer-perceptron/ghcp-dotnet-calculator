name: 07-permissions-workflow

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: show-workflow-context
        run: |
          echo "The workflow was triggered by ${{ github.event_name }}."
          echo "The GITHUB_TOKEN is limited to read-only repository contents."

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: list-workflow-files
        run: |
          echo "Workflow files available to this read-only job:"
          find .github/workflows -maxdepth 1 -type f -name '??-*-workflow.yml' -print | sort
