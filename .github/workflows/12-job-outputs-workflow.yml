# Workflow 12: Job outputs
# Demonstrates mapping step outputs to job outputs and consuming them through needs.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/pass-job-outputs
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idoutputs

name: 12-job-outputs-workflow

run-name: 12-job-outputs-workflow passes job outputs on ${{ github.ref_name }}

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Job outputs are available only to downstream jobs that declare this job in needs.
    outputs:
      branch_name: ${{ steps.metadata.outputs.branch_name }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
    steps:
      - name: prepare-metadata
        id: metadata
        run: |
          echo "branch_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  consume-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: collect-metadata
    steps:
      - name: show-metadata-from-needs
        env:
          BRANCH_NAME: ${{ needs.collect-metadata.outputs.branch_name }}
          SHORT_SHA: ${{ needs.collect-metadata.outputs.short_sha }}
        run: |
          echo "Branch from upstream job output: $BRANCH_NAME"
          echo "Short SHA from upstream job output: $SHORT_SHA"
