# Workflow 02: Script runners
# Demonstrates inline shell commands, a checked-in PowerShell script, and inline Python.
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/add-scripts
# Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstepsrun

name: 02-list-dir-with-python-workflow
on:
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "🎉 The job was triggered by event: ${{ github.event_name }}"
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ."

      - uses: actions/checkout@v4

      - name: list-contents-with-echo
        run: |
          echo "The repository ${{ github.repository }} contains the following files:"
          tree

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: list-contents-with-powershell
        shell: pwsh
        run: ./scripts/Get-DirectoryContents.ps1

      # Inline run steps can choose any executable available on the runner image.
      # Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstepsshell
      - name: list-contents-with-python
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path("./src")
          for path in sorted(root.rglob("*")):
              print(path.as_posix())
          PY
