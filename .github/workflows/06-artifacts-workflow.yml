# Workflow 06: Artifacts
# Demonstrates uploading generated files in one job and downloading them in a dependent job.
# Docs: https://docs.github.com/en/actions/tutorials/store-and-share-data
# Docs: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/pass-job-outputs

name: 06-artifacts-workflow
on:
  workflow_dispatch:

jobs:
  list-contents:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: |
          echo "🎉 The job was triggered by event: ${{ github.event_name }}"
          echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ."

      - name: checkout-repository
        uses: actions/checkout@v4

      - name: list-contents-with-echo
        run: |
          echo "The repository ${{ github.repository }} contains the following files:"
          tree

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: list-contents-with-powershell-script
        shell: pwsh
        run: ./scripts/Get-DirectoryContents.ps1

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: list-contents-with-powershell-inline
        shell: pwsh
        run: |
          New-Item -Path artifacts -ItemType Directory -Force -Verbose
          Get-ChildItem -Path . | Out-File -Path artifacts/list-contents.txt
          Import-Csv -Path inputs/variables.csv -Header Key,Value | Export-Csv -Path artifacts/variables-output.csv -NoTypeInformation -Verbose

      # List the directory contents of the repository using a python script at scripts/getDirectoryContents.py
      - name: list-contents-with-python
        run: python3 scripts/getDirectoryContents.py

      - name: upload-artifact
        # Artifacts persist files from a workflow run and can be shared with later jobs.
        uses: actions/upload-artifact@v4
        with:
          name: list-contents
          path: artifacts/**/*

  retrieve-values:
    runs-on: ubuntu-latest
    needs: list-contents
    environment: qua
    env:
      TARGET_ENVIRONMENT: qua
      QUA_VARIABLE: ${{ vars[format('{0}', 'QUA_VARIABLE')] || 'qua-demo-variable-default' }}
      QUA_SECRET: ${{ secrets[format('{0}', 'QUA_SECRET')] }}
    steps:
      - name: explain-artifact-environment
        run: echo "Downloading artifacts for the ${{ env.TARGET_ENVIRONMENT }} environment."

      - name: prepare-artifact-secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:QUA_SECRET)) {
            $secretValue = "demo-qua-secret-$([Guid]::NewGuid())"
            Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_SOURCE=generated-demo-default"
          }
          else {
            $secretValue = $env:QUA_SECRET
            Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_SOURCE=environment-secret"
          }

          "::add-mask::$secretValue"
          Add-Content -Path $env:GITHUB_ENV -Value "QUA_SECRET_VALUE=$secretValue"

      - name: retrieve-secrets
        run: echo "QUA_SECRET source is $QUA_SECRET_SOURCE. The value is masked and not printed."

      - name: retrieve-variables
        run: |
          echo "The target environment is ${{ env.TARGET_ENVIRONMENT }}."
          echo "The value of QUA_VARIABLE is ${{ env.QUA_VARIABLE }}."

      - name: download-artifact
        # The needs dependency ensures the producer job finishes before this consumer downloads the artifact.
        uses: actions/download-artifact@v4
        with:
          name: list-contents
          path: downloads

      # Add a step to list the directory contents of the repository with a powershell script at scripts/Get-DirectoryContents.ps1
      - name: show-contents-from-artifact
        shell: pwsh
        run: |
          Get-Content -Path downloads/list-contents.txt
          Import-Csv -Path downloads/variables-output.csv
