# Workflow 24: Deploy Azure resources with Terraform
# Demonstrates GitHub OIDC authentication, Terraform validation, and Azure resource deployment.

name: 24-deploy-resources-workflow

run-name: 24-deploy-resources-workflow ${{ inputs.terraform_action || 'plan' }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run. Use plan first, then apply after reviewing the plan.
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
      azure_client_id:
        description: Application client ID for calc-project-app-01 after bootstrap federation is created.
        required: true
        type: string
      postgresql_additional_entra_admin_object_id:
        description: Optional Entra object ID of autocloudarc@autocloudarc.dev to register as an additional PostgreSQL Entra administrator.
        required: false
        type: string
      postgresql_additional_entra_admin_name:
        description: Optional UPN of the additional PostgreSQL Entra administrator (e.g. autocloudarc@autocloudarc.dev). Required when postgresql_additional_entra_admin_object_id is provided.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ inputs.azure_client_id }}
  ARM_TENANT_ID: 54d665dd-30f1-45c5-a8d5-d6ffcdb518f9
  ARM_SUBSCRIPTION_ID: dee9fea3-65b6-45ad-8b44-f38b05c31fa9
  ARM_USE_OIDC: true
  TF_IN_AUTOMATION: true
  TF_VAR_subscription_id: dee9fea3-65b6-45ad-8b44-f38b05c31fa9
  TF_VAR_tenant_id: 54d665dd-30f1-45c5-a8d5-d6ffcdb518f9
  TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
  TF_VAR_postgresql_admin_username: postgres_user
  TF_VAR_postgresql_additional_entra_admin_object_id: ${{ inputs.postgresql_additional_entra_admin_object_id }}
  TF_VAR_postgresql_additional_entra_admin_name: ${{ inputs.postgresql_additional_entra_admin_name }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: infra/terraform/24-postgresql-flexible-server
    steps:
      - name: validate-oidc-configuration
        working-directory: .
        run: |
          if [ -z "$ARM_CLIENT_ID" ]; then
            echo "::error::Provide the calc-project-app-01 application client ID in the azure_client_id workflow input after bootstrap."
            exit 1
          fi
          if [ -z "$TF_VAR_postgresql_admin_password" ]; then
            echo "::error::Set repository secret POSTGRES_ADMIN_PASSWORD before running this workflow."
            exit 1
          fi
          echo "Using subscription $ARM_SUBSCRIPTION_ID and tenant $ARM_TENANT_ID."

      - name: checkout-repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: azure-login
        uses: azure/login@v3
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: setup-terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.15.6

      - name: ensure-terraform-state-backend
        env:
          TF_STATE_RESOURCE_GROUP_NAME: rg-dev
          TF_STATE_LOCATION: eastus2
          TF_STATE_CONTAINER_NAME: tfstate
        run: |
          state_account_name="${TF_STATE_STORAGE_ACCOUNT_NAME:-calctfstate${{ github.repository_id }}}"

          az storage account show \
            --name "$state_account_name" \
            --resource-group "$TF_STATE_RESOURCE_GROUP_NAME" \
            --only-show-errors 1>/dev/null 2>&1 || \
          az storage account create \
            --name "$state_account_name" \
            --resource-group "$TF_STATE_RESOURCE_GROUP_NAME" \
            --location "$TF_STATE_LOCATION" \
            --sku Standard_LRS \
            --kind StorageV2 \
            --min-tls-version TLS1_2 \
            --allow-blob-public-access false \
            --only-show-errors 1>/dev/null

          account_key=$(az storage account keys list \
            --account-name "$state_account_name" \
            --resource-group "$TF_STATE_RESOURCE_GROUP_NAME" \
            --query "[0].value" \
            --output tsv)

          az storage container create \
            --name "$TF_STATE_CONTAINER_NAME" \
            --account-name "$state_account_name" \
            --account-key "$account_key" \
            --only-show-errors 1>/dev/null

          {
            echo "TF_BACKEND_STORAGE_ACCOUNT_NAME=$state_account_name"
            echo "TF_BACKEND_CONTAINER_NAME=$TF_STATE_CONTAINER_NAME"
          } >> "$GITHUB_ENV"

      - name: terraform-init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-dev" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT_NAME" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER_NAME" \
            -backend-config="key=24-postgresql-flexible-server.tfstate"

      - name: terraform-format-check
        run: terraform fmt -check -diff -recursive

      - name: terraform-validate
        run: terraform validate

      - name: terraform-plan
        run: terraform plan -var-file="main.tfvars.json" -out="24-deploy-resources.tfplan"

      - name: terraform-apply
        if: ${{ inputs.terraform_action == 'apply' }}
        run: terraform apply -auto-approve "24-deploy-resources.tfplan"

      - name: store-postgresql-credentials-in-key-vault
        if: ${{ inputs.terraform_action == 'apply' }}
        env:
          KEY_VAULT_NAME: calc-kvt-01
          POSTGRESQL_ADMIN_USERNAME_SECRET_NAME: postgresql-admin-username
          POSTGRESQL_ADMIN_PASSWORD_SECRET_NAME: postgresql-admin-password
        run: |
          secret_expiry_utc=$(date -u -d '+30 days' '+%Y-%m-%dT%H:%M:%SZ')

          for attempt in 1 2 3 4 5; do
            if az keyvault secret set \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$POSTGRESQL_ADMIN_USERNAME_SECRET_NAME" \
              --value "$TF_VAR_postgresql_admin_username" \
              --expires "$secret_expiry_utc" \
              --content-type "text/plain" \
              --only-show-errors 1>/dev/null && \
              az keyvault secret set \
                --vault-name "$KEY_VAULT_NAME" \
                --name "$POSTGRESQL_ADMIN_PASSWORD_SECRET_NAME" \
                --value "$TF_VAR_postgresql_admin_password" \
                --expires "$secret_expiry_utc" \
                --content-type "text/plain" \
                --only-show-errors 1>/dev/null; then
              echo "PostgreSQL credentials were stored in Key Vault $KEY_VAULT_NAME."
              exit 0
            fi

            echo "Waiting for Key Vault RBAC propagation before retry $attempt."
            sleep 15
          done

          echo "::error::Unable to store PostgreSQL credentials in Key Vault after RBAC propagation retries."
          exit 1
